`;

let datos = raw.split("\n")
  .map(l => l.trim())
  .filter(l => l !== "")
  .map(l => {
    let partes = l.split(" - ");
    return {
      original: l,
      nombre: partes[0] || "",
      autor: partes[1] || "Desconocido",
      fav: false
    };
  });

const lista = document.getElementById("lista");
const buscador = document.getElementById("buscador");
const contador = document.getElementById("contador");

let modo = "todos";

function render(filtroTexto = "") {
  lista.innerHTML = "";
  let count = 0;

  datos.forEach((d, i) => {
    let texto = (d.nombre + d.autor).toLowerCase();

    if (!texto.includes(filtroTexto.toLowerCase())) return;

    if (modo === "blp" && !d.nombre.toLowerCase().includes(".blp")) return;
    if (modo === "pack" && !d.nombre.toLowerCase().includes("pack")) return;
    if (modo === "icon" && !d.nombre.toLowerCase().includes("btn")) return;
    if (modo === "fav" && !d.fav) return;

    const div = document.createElement("div");
    div.className = "credito";

    div.innerHTML = `
      <span class="fav" onclick="toggleFav(${i})">${d.fav ? "⭐" : "☆"}</span>
      <div class="nombre">${d.nombre}</div>
      <div class="autor">👤 ${d.autor}</div>
    `;

    lista.appendChild(div);
    count++;
  });

  contador.textContent = `Mostrando ${count} de ${datos.length}`;
}

function toggleFav(i) {
  datos[i].fav = !datos[i].fav;
  render(buscador.value);
}

function filtrar(tipo) {
  modo = tipo;
  render(buscador.value);
}

function mostrarFavoritos() {
  modo = "fav";
  render(buscador.value);
}

buscador.addEventListener("input", e => {
  render(e.target.value);
});

render();

</script>
